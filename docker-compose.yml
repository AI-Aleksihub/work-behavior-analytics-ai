services:
  postgres:
    image: postgres:17
    container_name: wba-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - wba-ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: wba-ai-app
    restart: unless-stopped
    environment:
      # PostgreSQL connection settings for entrypoint script
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Override DATABASE_URL to use 'postgres' service name instead of 'localhost'
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      # Backward compatibility aliases (app uses LLM_MODEL)
      OPENAI_MODEL: ${OPENAI_MODEL}
      CUSTOM_MODEL: ${CUSTOM_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_URL: ${OPENAI_API_URL}
      CUSTOM_API_TOKEN: ${CUSTOM_API_TOKEN}
      CUSTOM_API_URL: ${CUSTOM_API_URL}
      MAX_TOKENS: ${MAX_TOKENS}
      LOG_FORMAT: ${LOG_FORMAT}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_DIR: /var/log/app
      ENABLE_FILE_LOGGING: "1"
      # Override NEO4J_URI to use 'neo4j' service name instead of 'localhost'
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_ENABLED: ${NEO4J_ENABLED}
      NEO4J_MODE: ${NEO4J_MODE}
      #Github MCP server settings
      GITHUB_MCP_ENABLED: ${GITHUB_MCP_ENABLED:-false}
      GITHUB_MCP_TOKEN: ${GITHUB_MCP_TOKEN:-}
      # In Docker, use service-to-service networking, not localhost.
      GITHUB_MCP_SERVER_URL: http://github-mcp:8082/mcp
      # RabbitMQ configuration
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    ports:
      - "8000:8000"
    volumes:
      # Mount .env file (read-only)
      - ./.env:/app/.env:ro
      # Mount logs directory
      - ./logs:/var/log/app
    networks:
      - wba-ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      github-mcp:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  github-mcp:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: wba-ai-github-mcp
    restart: unless-stopped
    command: ["http", "--port", "8082", "--read-only"]
    ports:
      - "8082:8082"
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_MCP_TOKEN}
      GITHUB_TOOLSETS: ${GITHUB_MCP_TOOLSETS:-default,issues,pull_requests,repos}
    networks:
      - wba-ai-network
    healthcheck:
      test: ["CMD", "/server/github-mcp-server", "list-scopes"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5.26-community
    container_name: wba-ai-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    restart: unless-stopped
    networks:
      - wba-ai-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USERNAME}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
      
  rabbitmq:
    image: rabbitmq:4-management
    container_name: wba-ai-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - wba-ai-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: wba-ai-influxdb
    restart: unless-stopped
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - wba-ai-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    container_name: wba-ai-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - wba-ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  jira-sync:
    build:
      context: .
      dockerfile: Dockerfile.jira-sync
    container_name: web-ai-jira-sync
    command: python connectors/modules/jira/main.py
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      PYTHONPATH: /app
      LOG_DIR: /var/log/jira-sync
    volumes:
      - ./logs:/var/log/jira-sync
    depends_on:
      neo4j:
        condition: service_healthy
      app:
        condition: service_healthy
    restart: "no"  # One-shot execution, run manually via docker compose run
    networks:
      - wba-ai-network

  github-sync:
    build:
      context: .
      dockerfile: Dockerfile.github-sync
    container_name: web-ai-github-sync
    command: python connectors/modules/github/main.py
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      PYTHONPATH: /app
      LOG_DIR: /var/log/github-sync
    volumes:
      - ./logs:/var/log/github-sync
    depends_on:
      neo4j:
        condition: service_healthy
      app:
        condition: service_healthy
    restart: "no"  # One-shot execution, run manually via docker compose run
    networks:
      - wba-ai-network

  github-producer:
    build:
      context: .
      dockerfile: Dockerfile.github-producer
    container_name: wba-ai-github-producer
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/postgres
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      PYTHONPATH: /app
      LOG_DIR: /var/log/github-producer
    volumes:
      - ./logs:/var/log/github-producer
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: "no"  # One-shot execution, run manually via docker compose run
    networks:
      - wba-ai-network

  jira-producer:
    build:
      context: .
      dockerfile: Dockerfile.jira-producer
    container_name: wba-ai-jira-producer
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/postgres
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      PYTHONPATH: /app
      LOG_DIR: /var/log/jira-producer
    volumes:
      - ./logs:/var/log/jira-producer
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: "no"  # One-shot execution, run manually via docker compose run
    networks:
      - wba-ai-network

networks:
  wba-ai-network:
    driver: bridge

volumes:
  influxdb_data:
  elasticsearch_data:
  pgdata:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  rabbitmq_data:
