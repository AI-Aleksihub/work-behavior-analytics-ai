name: Pytest and Pylint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest-unit:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
      DATABASE_URL: postgresql+asyncpg://username:pwd@localhost:5432/postgres
      NEO4J_ENABLED: "false"
      OPENAI_API_KEY: "sk-test-dummy-key-for-ci"
      LLM_MODEL: "gpt-4o"
      GITHUB_MCP_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.app.txt -r requirements.github-sync.txt -r requirements.jira-sync.txt -r requirements_dev.txt

      - name: Run unit tests
        run: pytest -q -m unit tests --cov=src --cov-report=term-missing:skip-covered

  pylint:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.app.txt -r requirements.github-sync.txt -r requirements.jira-sync.txt -r requirements_dev.txt

      - name: Run pylint on app and connectors
        run: |
          SCORE=$(pylint src/app src/connectors --score=y --exit-zero | tee pylint.log | grep 'Your code has been rated at' | awk '{print $7}' | cut -d'/' -f1)
          PASS=$(echo "$SCORE >= 9.0" | bc)
          if [ "$PASS" -ne 1 ]; then
            echo "Pylint score is less than 9.0 ($SCORE). Failing the job."
            exit 1
          fi
          echo "Pylint score is $SCORE."
