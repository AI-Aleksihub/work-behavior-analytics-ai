name: Shared Jira Work
description: Find Jira issues reported by one and assigned to the other.
parameters:
- name: person1_id
  env_var: PERSON1_ID
  required: true
- name: person2_id
  env_var: PERSON2_ID
  required: true
queries:
  tabular: |-
    MATCH (p1:Person {id: $person1_id}), (p2:Person {id: $person2_id})
    MATCH (reporter:Person)-[:REPORTED_BY]-(issue:Issue)-[:ASSIGNED_TO]-(assignee:Person)
    WHERE (reporter = p1 AND assignee = p2) OR (reporter = p2 AND assignee = p1)
    RETURN reporter.name as reporter,
           assignee.name as assignee,
           count(issue) as issue_count,
           collect(issue.key)[0..5] as sample_issues
    ORDER BY issue_count DESC
        LIMIT 10
  graph: |-
    MATCH (p1:Person {id: $person1_id}), (p2:Person {id: $person2_id})
    MATCH path = (reporter:Person)-[:REPORTED_BY]-(issue:Issue)-[:ASSIGNED_TO]-(assignee:Person)
    WHERE (reporter = p1 AND assignee = p2) OR (reporter = p2 AND assignee = p1)
    RETURN path
    LIMIT 100
tags:
- test
- table
- graph
