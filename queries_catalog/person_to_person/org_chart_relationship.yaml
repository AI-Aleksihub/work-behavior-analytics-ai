name: Org Chart Relationship
description: Check direct or indirect management relationship between the two people.
summary: Check whether two people are connected through the reporting hierarchy.
default_view: graph
parameters:
- name: person1_id
  env_var: PERSON1_ID
  required: true
  label: First person
  type: person_id
  placeholder: Enter first person id
  description: Neo4j Person.id for the first person.
- name: person2_id
  env_var: PERSON2_ID
  required: true
  label: Second person
  type: person_id
  placeholder: Enter second person id
  description: Neo4j Person.id for the second person.
queries:
  tabular: |-
    MATCH (p1:Person {id: $person1_id}), (p2:Person {id: $person2_id})
    OPTIONAL MATCH path_up = (p1)-[:REPORTS_TO*..5]->(p2)
    OPTIONAL MATCH path_down = (p2)-[:REPORTS_TO*..5]->(p1)
    RETURN p1.name as person1,
           p2.name as person2,
           CASE
             WHEN path_up IS NOT NULL THEN p1.name + ' reports to ' + p2.name
             WHEN path_down IS NOT NULL THEN p2.name + ' reports to ' + p1.name
             ELSE 'No direct reporting line within 5 levels'
           END as reporting_relationship, coalesce(length(path_up), length(path_down), 0) as levels_apart
        LIMIT 10
  graph: |-
    MATCH (p1:Person {id: $person1_id}), (p2:Person {id: $person2_id})
    OPTIONAL MATCH path_up = (p1)-[:REPORTS_TO*..5]->(p2)
    OPTIONAL MATCH path_down = (p2)-[:REPORTS_TO*..5]->(p1)
    RETURN path_up, path_down
    LIMIT 100
tags:
- test
- table
- graph
owner: graph-team
status: active
