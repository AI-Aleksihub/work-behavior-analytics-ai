name: Page Lineage Depth
description: Measure how deep pages sit in the Confluence tree.
summary: "Measure how deep pages sit in the Confluence tree."
default_view: tabular
owner: confluence-analytics
status: active
queries:
  tabular: |-
    MATCH (p:Page)
    OPTIONAL MATCH path = shortestPath((p)-[:PARENT_OF*0..10]->(root:Page))
    RETURN p.title as page_title,
           CASE WHEN path IS NULL THEN 0 ELSE length(path) END as lineage_depth,
           root.title as root_title,
           p.status as status,
           p.last_updated_at as last_updated_at
    ORDER BY lineage_depth DESC, page_title
    LIMIT 100
  graph: |-
    MATCH p1=(p:Page)-[:PARENT_OF*1..10]->(ancestor:Page)
    RETURN p1
    LIMIT 100
tags:
- test
- table
- graph
