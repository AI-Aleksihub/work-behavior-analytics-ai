name: Orphan Pages
description: Pages with no parent or child pages.
summary: "Pages with no parent or child pages."
default_view: tabular
owner: confluence-analytics
status: active
queries:
  tabular: |-
    MATCH (p:Page)
    WHERE NOT (p)-[:PARENT_OF]->(:Page)
      AND NOT (p)<-[:PARENT_OF]-(:Page)
    RETURN p.title as page_title,
           p.status as status,
           p.last_updated_at as last_updated_at
    ORDER BY last_updated_at DESC, page_title
    LIMIT 100
  graph: |-
    MATCH p1=(p:Page)
    WHERE NOT (p)-[:PARENT_OF]->(:Page)
      AND NOT (p)<-[:PARENT_OF]-(:Page)
    RETURN p1
    LIMIT 100
tags:
- test
- table
- graph
