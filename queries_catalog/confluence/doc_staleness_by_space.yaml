name: Doc Staleness by Space
description: Compare document freshness and age across Confluence spaces.
summary: "Compare document freshness and age across Confluence spaces."
default_view: tabular
owner: confluence-analytics
status: active
queries:
  tabular: |-
    MATCH (s:Space)<-[:IN_SPACE]-(doc)
    WHERE doc:Page OR doc:Blogpost
    WITH s, doc, coalesce(doc.last_updated_at, doc.created_at) as touched_at
    RETURN s.key as space_key,
           s.name as space_name,
           count(DISTINCT doc) as document_count,
           min(touched_at) as oldest_doc_activity,
           max(touched_at) as newest_doc_activity,
           avg(duration.between(touched_at, datetime()).days) as avg_doc_age_days,
           sum(CASE WHEN doc:Page THEN 1 ELSE 0 END) as page_count,
           sum(CASE WHEN doc:Blogpost THEN 1 ELSE 0 END) as blogpost_count
    ORDER BY avg_doc_age_days DESC, document_count DESC, space_key
    LIMIT 100
  graph: |-
    MATCH p1=(s:Space)<-[:IN_SPACE]-(doc)
    WHERE doc:Page OR doc:Blogpost
    RETURN p1
    LIMIT 100
tags:
- test
- table
- graph
