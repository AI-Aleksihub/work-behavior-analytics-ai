name: Page Edit Churn Hotspots
description: Identify pages with the highest version churn and latest updates.
summary: "Identify pages with the highest version churn and latest updates."
default_view: tabular
owner: confluence-analytics
status: active
queries:
  tabular: |-
    MATCH (p:Page)
    RETURN p.title as page_title,
           p.version as version,
           p.status as status,
           p.last_updated_at as last_updated_at
    ORDER BY coalesce(p.version, 0) DESC, p.last_updated_at DESC, p.title
    LIMIT 100
  graph: |-
    MATCH p1=(editor:Person)-[:MODIFIED]->(p:Page)
    RETURN p1
    LIMIT 100
tags:
- test
- table
- graph
