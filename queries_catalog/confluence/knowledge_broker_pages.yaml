name: Knowledge Broker Pages
description: Pages edited or discussed by the widest set of people.
summary: "Pages edited or discussed by the widest set of people."
default_view: tabular
owner: confluence-analytics
status: active
queries:
  tabular: |-
    MATCH (p:Page)<-[:CREATED|MODIFIED|COMMENTED_ON|REACTED_TO]-(person:Person)
    RETURN p.title as page_title,
           p.last_updated_at as last_updated_at,
           p.status as status,
           count(DISTINCT person) as unique_people,
           collect(DISTINCT person.name)[0..10] as sample_people
    ORDER BY unique_people DESC, last_updated_at DESC, page_title
    LIMIT 100
  graph: |-
    MATCH p1=(person:Person)-[:CREATED|MODIFIED|COMMENTED_ON|REACTED_TO]->(p:Page)
    RETURN p1
    LIMIT 100
tags:
- test
- table
- graph
