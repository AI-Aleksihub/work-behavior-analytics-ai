name: End-to-End Traceability
description: "Complete Initiative \u2192 Epic \u2192 Issue \u2192 Commit \u2192 PR\
  \ chain."
queries:
  tabular: |-
    MATCH (init:Initiative)<-[:PART_OF]-(e:Epic)<-[:PART_OF]-(i:Issue)
        MATCH (i)<-[:REFERENCES]-(c:Commit)<-[:INCLUDES]-(pr:PullRequest)
        RETURN init.key as initiative, e.key as epic, i.key as issue,
               c.sha as commit_sha, pr.number as pr_number
        LIMIT 10
  graph: |-
    MATCH p1=(init:Initiative)<-[:PART_OF]-(e:Epic)<-[:PART_OF]-(i:Issue)
        MATCH p2=(i)<-[:REFERENCES]-(c:Commit)<-[:INCLUDES]-(pr:PullRequest)
        RETURN p1, p2
        LIMIT 100
tags:
- test
- table
- graph
