name: Issue to Code Linkage
description: Issues linked to actual code commits.
summary: "Issues linked to actual code commits."
default_view: tabular
owner: data-platform
status: active
queries:
  tabular: |-
    MATCH (i:Issue)<-[:REFERENCES]-(c:Commit)
        RETURN i.key, i.type, i.summary,
               count(c) as commit_count
        ORDER BY commit_count DESC
        LIMIT 100
  graph: |-
    MATCH p1=(i:Issue)<-[:REFERENCES]-(c:Commit)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
