name: PR to Jira Mapping
description: PRs linked to Jira issues via commits.
queries:
  tabular: |-
    MATCH (pr:PullRequest)-[:INCLUDES]->(c:Commit)-[:REFERENCES]->(i:Issue)
        RETURN pr.number as pr_number, pr.title,
               collect(DISTINCT i.key) as jira_issues,
               size(collect(DISTINCT i.key)) as issue_count
        ORDER BY issue_count DESC
        LIMIT 10
  graph: |-
    MATCH p1=(pr:PullRequest)-[:INCLUDES]->(c:Commit)-[:REFERENCES]->(i:Issue)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
