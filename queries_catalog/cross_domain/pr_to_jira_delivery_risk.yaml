name: PR to Jira Delivery Risk
description: Pull requests linked to Jira issues with an aggregated delivery risk score.
summary: "Pull requests linked to Jira issues with an aggregated delivery risk score."
default_view: tabular
owner: data-platform
status: active
queries:
  tabular: |-
    MATCH (pr:PullRequest)-[:INCLUDES]->(c:Commit)-[:REFERENCES]->(issue:Issue)
        OPTIONAL MATCH (pr)-[:TARGETS]->(:Branch)-[:BRANCH_OF]-(r:Repository)
        WITH r, pr,
             collect(DISTINCT issue) as issues,
             count(DISTINCT c) as linked_commits,
             toFloat(coalesce(pr.additions, 0) + coalesce(pr.deletions, 0)) as churn,
             toFloat(coalesce(pr.review_comments, 0)) as review_comments,
             toFloat(coalesce(pr.comments, 0)) as comments
        UNWIND issues as linked_issue
        WITH r, pr, linked_commits, churn, review_comments, comments,
             count(DISTINCT linked_issue) as issue_count,
             sum(CASE WHEN linked_issue.priority IN ['High', 'Highest', 'Critical'] THEN 1 ELSE 0 END) as high_priority_issues,
             max(duration.between(date(linked_issue.created_at), date()).days) as oldest_issue_age_days,
             avg(duration.between(date(linked_issue.created_at), date()).days) as avg_issue_age_days
        RETURN coalesce(r.name, pr.base_branch_name) as repository,
               pr.number as pr_number,
               pr.title as title,
               issue_count,
               high_priority_issues,
               oldest_issue_age_days,
               round(avg_issue_age_days, 1) as avg_issue_age_days,
               linked_commits,
               churn,
               review_comments,
               comments,
               round((issue_count * 2.0) + (high_priority_issues * 3.0) + (oldest_issue_age_days / 10.0) + (churn / 400.0) + (review_comments * 0.5), 1) as delivery_risk_score
        ORDER BY delivery_risk_score DESC, oldest_issue_age_days DESC
        LIMIT 100
  graph: |-
    MATCH p1=(pr:PullRequest)-[:INCLUDES]->(c:Commit)-[:REFERENCES]->(issue:Issue)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph

