name: Code Changes Without Doc Update
description: Commits linked to issues that have no Confluence references.
summary: "Commits linked to issues that have no Confluence references."
default_view: tabular
owner: cross-domain-analytics
status: active
queries:
  tabular: |-
    MATCH (c:Commit)-[:REFERENCES]->(i:Issue)
    WHERE NOT (i)<-[:REFERENCES]-(:Page)
      AND NOT (i)<-[:REFERENCES]-(:Blogpost)
    RETURN i.key as issue_key,
           i.summary as summary,
           count(DISTINCT c) as commit_count,
           collect(DISTINCT c.sha)[0..10] as sample_commits
    ORDER BY commit_count DESC, issue_key
    LIMIT 100
  graph: |-
    MATCH p1=(c:Commit)-[:REFERENCES]->(i:Issue)
    WHERE NOT (i)<-[:REFERENCES]-(:Page)
      AND NOT (i)<-[:REFERENCES]-(:Blogpost)
    RETURN p1
    LIMIT 100
tags:
- test
- table
- graph
