name: Epic Doc Coverage
description: Measure documentation coverage for epics through their issues.
summary: "Measure documentation coverage for epics through their issues."
default_view: tabular
owner: cross-domain-analytics
status: active
queries:
  tabular: |-
    MATCH (e:Epic)<-[:PART_OF]-(i:Issue)
    OPTIONAL MATCH (doc)
    WHERE (doc:Page OR doc:Blogpost) AND (doc)-[:REFERENCES]->(i)
    WITH e,
         count(DISTINCT i) as issue_count,
         count(DISTINCT doc) as doc_count,
         collect(DISTINCT doc.title)[0..10] as sample_docs
    RETURN e.key as epic_key,
           e.summary as epic_summary,
           issue_count,
           doc_count,
           sample_docs
    ORDER BY doc_count DESC, issue_count DESC, epic_key
    LIMIT 100
  graph: |-
    MATCH p1=(e:Epic)<-[:PART_OF]-(i:Issue)<-[:REFERENCES]-(doc)
    WHERE doc:Page OR doc:Blogpost
    RETURN p1
    LIMIT 100
tags:
- test
- table
- graph
