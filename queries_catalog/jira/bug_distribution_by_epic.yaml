name: Bug Distribution by Epic
description: Bugs grouped by epic.
summary: "Bugs grouped by epic."
default_view: tabular
owner: jira-analytics
status: active
queries:
  tabular: |-
    MATCH (bug:Issue {type: 'Bug'})-[:PART_OF]->(e:Epic)
        RETURN e.key, e.summary, count(bug) as bug_count
        ORDER BY bug_count DESC
        LIMIT 100
  graph: |-
    MATCH p1=(bug:Issue {type: 'Bug'})-[:PART_OF]->(e:Epic)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
