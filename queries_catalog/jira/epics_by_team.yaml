name: Epics by Team
description: Epics assigned to each team.
summary: "Epics assigned to each team."
default_view: tabular
owner: jira-analytics
status: active
queries:
  tabular: |-
    MATCH (e:Epic)-[:TEAM]-(t:Team)
        RETURN t.name, count(e) as epic_count, collect(e.key) as epics
        ORDER BY epic_count DESC
        LIMIT 100
  graph: |-
    MATCH p1=(e:Epic)-[:TEAM]-(t:Team)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
