name: Project Hierarchy
description: Projects and their initiatives.
queries:
  tabular: |-
    MATCH (p:Project)<-[:PART_OF]-(i:Initiative)
        RETURN p.name, collect(i.summary) as initiatives
        ORDER BY p.name
        LIMIT 10
  graph: |-
    MATCH p1=(p:Project)<-[:PART_OF]-(i:Initiative)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
