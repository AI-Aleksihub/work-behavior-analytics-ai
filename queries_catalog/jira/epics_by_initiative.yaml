name: Epics by Initiative
description: Epics grouped by initiative.
summary: "Epics grouped by initiative."
default_view: tabular
owner: jira-analytics
status: active
queries:
  tabular: |-
    MATCH (e:Epic)-[:PART_OF]->(i:Initiative)
        RETURN i.key, i.summary, collect(e.key) as epics
        ORDER BY i.key
        LIMIT 10
  graph: |-
    MATCH p1=(e:Epic)-[:PART_OF]->(i:Initiative)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
