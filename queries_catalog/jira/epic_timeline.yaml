name: Epic Timeline
description: Epic timeline by start date.
summary: "Epic timeline by start date."
default_view: tabular
owner: jira-analytics
status: active
queries:
  tabular: |-
    MATCH (e:Epic)
        RETURN e.key, e.summary, e.start_date, e.due_date, e.status
        ORDER BY e.start_date, e.key
        LIMIT 100
  graph: |-
    MATCH p1=(e:Epic)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
