name: Epic Ownership Distribution
description: Epic ownership by person.
summary: "Epic ownership by person."
default_view: tabular
owner: jira-analytics
status: active
queries:
  tabular: |-
    MATCH (e:Epic)-[:ASSIGNED_TO]-(p:Person)
        RETURN p.name, p.role, count(e) as epic_count
        ORDER BY epic_count DESC
        LIMIT 10
  graph: |-
    MATCH p1=(e:Epic)-[:ASSIGNED_TO]-(p:Person)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
