name: Branches by Work Item
description: Branches linked to specific work item.
summary: "Branches linked to specific work item."
default_view: tabular
owner: github-analytics
status: active
queries:
  tabular: |-
    MATCH (b:Branch)-[:BRANCH_OF]-(r:Repository)
        WHERE b.name CONTAINS 'PLAT-1'
        RETURN r.name, b.name
        ORDER BY r.name, b.name
        LIMIT 10
  graph: |-
    MATCH p1=(b:Branch)-[:BRANCH_OF]-(r:Repository)
        WHERE b.name CONTAINS 'PLAT-1'
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
