name: Multi-Repository Contributors
description: People working across multiple repos.
summary: "People working across multiple repos."
default_view: tabular
owner: github-analytics
status: active
queries:
  tabular: |-
    MATCH (p:Person)-[c:COLLABORATOR]-(r:Repository)
        WITH p, c.permission as perm, collect(r.name) as repos
        WHERE size(repos) > 1
        RETURN p.name, p.title, perm, repos, size(repos) as repo_count
        ORDER BY repo_count DESC
        LIMIT 10
  graph: |-
    MATCH p1=(p:Person)-[c:COLLABORATOR]-(r:Repository)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
