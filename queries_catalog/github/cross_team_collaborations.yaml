name: Cross-Team Collaborations
description: Teams with READ access to repositories.
summary: "Teams with READ access to repositories."
default_view: tabular
owner: github-analytics
status: active
queries:
  tabular: |-
    MATCH (t:Team)-[c:COLLABORATOR {permission: 'READ'}]-(r:Repository)
        RETURN r.name, collect(t.name) as read_access_teams
        ORDER BY r.name
        LIMIT 100
  graph: |-
    MATCH p1=(t:Team)-[c:COLLABORATOR {permission: 'READ'}]-(r:Repository)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
