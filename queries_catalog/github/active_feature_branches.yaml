name: Active Feature Branches
description: Find active non-default branches.
summary: "Find active non-default branches."
default_view: tabular
owner: github-analytics
status: active
queries:
  tabular: |-
    MATCH (b:Branch)-[:BRANCH_OF]-(r:Repository)
        WHERE NOT b.is_default AND NOT b.is_deleted
        RETURN r.name, b.name, b.last_commit_timestamp
        ORDER BY b.last_commit_timestamp DESC
        LIMIT 100
  graph: |-
    MATCH p1=(b:Branch)-[:BRANCH_OF]-(r:Repository)
        WHERE NOT b.is_default AND NOT b.is_deleted
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
