name: Protected Branches
description: Protected branches across all repos.
summary: "Protected branches across all repos."
default_view: tabular
owner: github-analytics
status: active
queries:
  tabular: |-
    MATCH (b:Branch)-[:BRANCH_OF]-(r:Repository)
        WHERE b.is_protected
        RETURN r.name, collect(b.name) as protected_branches
        ORDER BY r.name
        LIMIT 100
  graph: |-
    MATCH p1=(b:Branch)-[:BRANCH_OF]-(r:Repository)
        WHERE b.is_protected
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
