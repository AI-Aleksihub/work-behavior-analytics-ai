name: Hotspot Files
description: Files with most modifications.
summary: "Files with most modifications."
default_view: tabular
owner: github-analytics
status: active
queries:
  tabular: |-
    MATCH (f:File)<-[:MODIFIES]-(c:Commit)
        RETURN f.path as path, f.language as lang, count(c) as modifications
        ORDER BY modifications DESC
        LIMIT 100
  graph: |-
    MATCH p1=(f:File)<-[:MODIFIES]-(c:Commit)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
