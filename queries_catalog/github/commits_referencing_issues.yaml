name: Commits Referencing Issues
description: Commits referencing Jira issues by issue type.
summary: "Commits referencing Jira issues by issue type."
default_view: tabular
owner: github-analytics
status: active
queries:
  tabular: |-
    MATCH (c:Commit)-[:REFERENCES]->(i:Issue)
        RETURN i.key as issue, i.type as type, count(c) as commits
        ORDER BY commits DESC
        LIMIT 100
  graph: |-
    MATCH p1=(c:Commit)-[:REFERENCES]->(i:Issue)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
