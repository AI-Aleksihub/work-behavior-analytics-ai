name: Repository Maintainers
description: Find maintainers (people with WRITE access).
summary: "Find maintainers (people with WRITE access)."
default_view: tabular
owner: github-analytics
status: active
queries:
  tabular: |-
    MATCH (p:Person)-[c:COLLABORATOR {permission: 'WRITE'}]-(r:Repository)
        RETURN r.name, collect(p.name) as maintainers
        ORDER BY r.name
        LIMIT 100
  graph: |-
    MATCH p1=(p:Person)-[c:COLLABORATOR {permission: 'WRITE'}]-(r:Repository)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
