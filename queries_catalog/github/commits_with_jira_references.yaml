name: Commits with Jira References
description: Commits with Jira references.
queries:
  tabular: |-
    MATCH (c:Commit)-[:REFERENCES]->(i:Issue)
        RETURN count(DISTINCT c) as commits_with_refs,
               count(DISTINCT i) as issues_referenced
        LIMIT 10
  graph: |-
    MATCH p1=(c:Commit)-[:REFERENCES]->(i:Issue)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
