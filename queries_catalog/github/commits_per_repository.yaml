name: Commits per Repository
description: Count commits per repository.
summary: "Count commits per repository."
default_view: tabular
owner: github-analytics
status: active
queries:
  tabular: |-
    MATCH (c:Commit)-[:PART_OF]->(b:Branch)-[:BRANCH_OF]-(r:Repository)
        WHERE b.is_default = true
        RETURN r.name as repo, count(c) as commits
        ORDER BY commits DESC
        LIMIT 100
  graph: |-
    MATCH p1=(c:Commit)-[:PART_OF]->(b:Branch)-[:BRANCH_OF]-(r:Repository)
        WHERE b.is_default = true
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
