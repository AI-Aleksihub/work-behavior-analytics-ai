name: Repository Ownership
description: View repositories with owning teams (WRITE access).
summary: "View repositories with owning teams (WRITE access)."
default_view: tabular
owner: github-analytics
status: active
queries:
  tabular: |-
    MATCH (t:Team)-[c:COLLABORATOR {permission: 'WRITE'}]-(r:Repository)
        RETURN t.name, r.name, r.language
        ORDER BY t.name, r.name
        LIMIT 100
  graph: |-
    MATCH p1=(t:Team)-[c:COLLABORATOR {permission: 'WRITE'}]-(r:Repository)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
