name: Organizational Hierarchy
description: View reporting structure.
queries:
  tabular: |-
    MATCH (p:Person)-[:REPORTS_TO]->(m:Person)
        RETURN p.name as employee, p.title, m.name as manager, m.title as manager_title
        ORDER BY m.name, p.name
  graph: |-
    MATCH p1=(p:Person)-[:REPORTS_TO]->(m:Person)
        RETURN p1
        LIMIT 100
tags:
- test
- table
- graph
