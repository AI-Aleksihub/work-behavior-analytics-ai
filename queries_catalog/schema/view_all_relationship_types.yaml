name: View All Relationship Types
description: Count all relationships by type.
summary: "Count all relationships by type."
default_view: graph
owner: graph-platform
status: active
queries:
  tabular: |-
    MATCH ()-[r]->()
        RETURN type(r) as relationship, count(*) as count
        ORDER BY count DESC
        LIMIT 10
  graph: |-
    CALL db.schema.visualization()
tags:
- test
- table
- graph
